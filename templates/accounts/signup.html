{% extends "base.html" %}
{% block title %}Sign up · NosyPet{% endblock %}

{% block content %}
<section class="card narrow">
    <h1>Create your pet</h1>
    <form method="post" novalidate>
        {% csrf_token %}
        {{ form.non_field_errors }}
        {% for field in form %}
            <label>
                {{ field.label }}
                {{ field }}
                {% if field.help_text %}<small class="muted">{{ field.help_text|safe }}</small>{% endif %}
                {{ field.errors }}
            </label>
        {% endfor %}
        <button type="submit" class="primary block">Hatch my pet</button>
    </form>
    <p class="muted center">Already have an account? <a href="{% url 'login' %}">Log in</a></p>
</section>
{% endblock %}

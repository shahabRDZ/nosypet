{% extends "base.html" %}
{% block title %}Reset password · NosyPet{% endblock %}

{% block content %}
<section class="card narrow">
    <h1>Forgot password</h1>
    <p class="muted">Enter your email and we will send a reset link.</p>
    <form method="post" novalidate>
        {% csrf_token %}
        {{ form.non_field_errors }}
        <label>
            Email
            {{ form.email }}
            {{ form.email.errors }}
        </label>
        <button type="submit" class="primary block">Send reset link</button>
    </form>
    <p class="muted center"><a href="{% url 'login' %}">Back to login</a></p>
</section>
{% endblock %}

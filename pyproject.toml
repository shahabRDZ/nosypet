[tool.ruff]
line-length = 100
target-version = "py313"
exclude = [".venv", "migrations", "staticfiles"]

[tool.ruff.lint]
select = ["E", "F", "W", "I", "B", "UP", "DJ"]
ignore = ["E501"]  # long lines occasionally OK in templates / SVG

[tool.ruff.lint.per-file-ignores]
"**/migrations/*.py" = ["E", "F", "W"]
"**/settings.py" = ["F401"]

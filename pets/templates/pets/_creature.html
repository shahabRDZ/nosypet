{% comment %}
The creature SVG. Classed groups make every body part animatable.
Stage class on the wrapper switches between egg / baby / teen / adult.
{% endcomment %}
<svg class="creature {{ pet.stage }} color-{{ pet.color }}" viewBox="0 0 220 260" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
    <defs>
        <radialGradient id="bodyGrad" cx="40%" cy="35%" r="75%">
            <stop offset="0%" stop-color="#ffd6e8"/>
            <stop offset="55%" stop-color="#ff9bc6"/>
            <stop offset="100%" stop-color="#e16aa8"/>
        </radialGradient>
        <radialGradient id="bellyGrad" cx="50%" cy="45%" r="65%">
            <stop offset="0%" stop-color="#fff3f8"/>
            <stop offset="100%" stop-color="#ffd2e6"/>
        </radialGradient>
        <radialGradient id="eggGrad" cx="40%" cy="35%" r="80%">
            <stop offset="0%" stop-color="#ffffff"/>
            <stop offset="60%" stop-color="#fff0d6"/>
            <stop offset="100%" stop-color="#e8c89b"/>
        </radialGradient>
        <linearGradient id="tipGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#fff8c4"/>
            <stop offset="100%" stop-color="#ffc857"/>
        </linearGradient>
        <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
            <feOffset dx="0" dy="3" result="off"/>
            <feComponentTransfer><feFuncA type="linear" slope="0.4"/></feComponentTransfer>
            <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
    </defs>

    <ellipse class="shadow" cx="110" cy="240" rx="60" ry="7"/>

    {# === Egg form (shown only when stage == 'egg') === #}
    <g class="egg-group">
        <ellipse class="egg" cx="110" cy="140" rx="62" ry="80" fill="url(#eggGrad)" filter="url(#softShadow)"/>
        <path class="egg-spot" d="M 75 100 q 8 -10 18 -3 q -2 12 -10 14 q -10 0 -8 -11 z" fill="#d8a86a" opacity="0.5"/>
        <path class="egg-spot" d="M 130 130 q 6 -4 11 0 q 0 8 -6 9 q -8 0 -5 -9 z" fill="#d8a86a" opacity="0.5"/>
        <path class="egg-crack crack-1" d="M 92 120 l 8 -10 l -4 -8 l 9 -6" stroke="#7a4a1a" stroke-width="2" fill="none" stroke-linecap="round"/>
        <path class="egg-crack crack-2" d="M 130 150 l -10 -6 l 4 -8 l -8 -8" stroke="#7a4a1a" stroke-width="2" fill="none" stroke-linecap="round"/>
    </g>

    {# === Pet body === #}
    <g class="body-group" filter="url(#softShadow)">
        {# Antenna #}
        <g class="antenna">
            <path d="M 110 70 Q 108 50 112 35" stroke="#c45c8e" stroke-width="2.5" fill="none" stroke-linecap="round"/>
            <circle class="antenna-tip" cx="113" cy="32" r="6.5" fill="url(#tipGrad)"/>
            <circle class="antenna-shine" cx="111" cy="30" r="1.6" fill="#fff" opacity="0.9"/>
        </g>

        {# Body #}
        <ellipse class="body" cx="110" cy="150" rx="75" ry="78" fill="url(#bodyGrad)"/>
        <ellipse class="belly" cx="110" cy="170" rx="48" ry="44" fill="url(#bellyGrad)"/>

        {# Cheeks #}
        <circle class="cheek cheek-l" cx="58" cy="160" r="9" fill="#ff7eb3" opacity="0.65"/>
        <circle class="cheek cheek-r" cx="162" cy="160" r="9" fill="#ff7eb3" opacity="0.65"/>

        {# Eyes #}
        <g class="eyes">
            <ellipse class="eye eye-l" cx="83" cy="135" rx="11" ry="14" fill="#1a1230"/>
            <ellipse class="eye eye-r" cx="137" cy="135" rx="11" ry="14" fill="#1a1230"/>
            <circle class="sparkle s-l-1" cx="86" cy="131" r="3.2" fill="#fff"/>
            <circle class="sparkle s-r-1" cx="140" cy="131" r="3.2" fill="#fff"/>
            <circle class="sparkle s-l-2" cx="80" cy="139" r="1.4" fill="#fff"/>
            <circle class="sparkle s-r-2" cx="134" cy="139" r="1.4" fill="#fff"/>
        </g>

        {# Eyelids (for blink and sleep) #}
        <path class="lid lid-l" d="M 72 135 Q 83 135 94 135" stroke="#1a1230" stroke-width="3.5" fill="none" stroke-linecap="round"/>
        <path class="lid lid-r" d="M 126 135 Q 137 135 148 135" stroke="#1a1230" stroke-width="3.5" fill="none" stroke-linecap="round"/>

        {# Mouth #}
        <path class="mouth" d="M 95 178 Q 110 192 125 178" stroke="#1a1230" stroke-width="3" fill="#ff6b9d" stroke-linejoin="round"/>

        {# Tongue (for eating) #}
        <ellipse class="tongue" cx="110" cy="187" rx="9" ry="4" fill="#ff5577"/>

        {# Feet #}
        <g class="foot foot-l">
            <ellipse cx="78" cy="222" rx="14" ry="8" fill="#c45c8e"/>
        </g>
        <g class="foot foot-r">
            <ellipse cx="142" cy="222" rx="14" ry="8" fill="#c45c8e"/>
        </g>

        {# Crown (adult only) #}
        <g class="crown">
            <path d="M 85 65 L 95 50 L 105 60 L 115 48 L 125 60 L 135 50 L 138 70 L 82 70 Z"
                  fill="#ffd166" stroke="#c89320" stroke-width="1.5" stroke-linejoin="round"/>
            <circle cx="95" cy="55" r="2.2" fill="#ff6b9d"/>
            <circle cx="115" cy="53" r="2.2" fill="#6dd3ff"/>
            <circle cx="135" cy="55" r="2.2" fill="#a78bfa"/>
        </g>
    </g>
</svg>

{% extends "base.html" %}
{% block title %}{{ pet.name }} · NosyPet{% endblock %}

{% block content %}
<section class="card">
    <header class="dashboard-head">
        <h1>{{ pet.name }}</h1>
        <span class="muted">level placeholder</span>
    </header>
    <div class="pet-stage">
        <div class="pet-bob big">🐥</div>
    </div>
    <ul class="stats">
        <li>
            <span>Hunger</span>
            <div class="bar"><div class="bar-fill hunger" style="width: {{ pet.hunger }}%"></div></div>
            <strong>{{ pet.hunger }}</strong>
        </li>
        <li>
            <span>Happiness</span>
            <div class="bar"><div class="bar-fill happy" style="width: {{ pet.happiness }}%"></div></div>
            <strong>{{ pet.happiness }}</strong>
        </li>
        <li>
            <span>Energy</span>
            <div class="bar"><div class="bar-fill energy" style="width: {{ pet.energy }}%"></div></div>
            <strong>{{ pet.energy }}</strong>
        </li>
    </ul>
    <p class="muted center">Action buttons arrive in the next phase.</p>
</section>
{% endblock %}
